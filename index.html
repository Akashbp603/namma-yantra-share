<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ನಮ್ಮ-ಯಂತ್ರ Share | Namma-Yantra Share</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Kannada:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --orange: #F97316;
    --orange-dark: #C2540A;
    --orange-light: #FFF7ED;
    --orange-mid: #FFEDD5;
    --green: #16A34A;
    --green-light: #DCFCE7;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --amber: #D97706;
    --amber-light: #FEF3C7;
    --bg: #FDF8F3;
    --surface: #FFFFFF;
    --surface2: #F9F5F0;
    --border: #E8DDD3;
    --text1: #1C1917;
    --text2: #57534E;
    --text3: #A8A29E;
    --shadow: 0 4px 24px rgba(201,130,60,0.13);
    --shadow-lg: 0 8px 40px rgba(201,130,60,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(135deg, #EA580C 0%, #F97316 60%, #FB923C 100%);
    padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    display: flex; align-items: center; gap: 12px;
  }
  .header-logo { font-size: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .header-text { flex: 1; }
  .header-title {
    font-family: 'Baloo 2', cursive;
    font-size: 19px; font-weight: 800;
    color: #fff; letter-spacing: 0.3px;
  }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: -1px; }
  .header-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 5px 12px;
    font-size: 12px; font-weight: 600; color: #fff;
    backdrop-filter: blur(8px);
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--green); color: #fff;
    padding: 10px 22px; border-radius: 30px;
    font-weight: 600; font-size: 14px; z-index: 999;
    box-shadow: 0 6px 24px rgba(22,163,74,0.4);
    opacity: 0; pointer-events: none;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); box-shadow: 0 6px 24px rgba(220,38,38,0.4); }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .nav-btn {
    flex: 1; border: none; background: none; cursor: pointer;
    padding: 10px 0 12px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: transform 0.15s;
  }
  .nav-btn:active { transform: scale(0.93); }
  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); transition: color 0.2s; }
  .nav-btn.active .nav-label { color: var(--orange); }
  .nav-dot {
    width: 20px; height: 3px; border-radius: 2px;
    background: var(--orange); margin-top: 2px;
    opacity: 0; transform: scaleX(0.3);
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .nav-btn.active .nav-dot { opacity: 1; transform: scaleX(1); }

  /* ─── PAGES ─── */
  .page { display: none; padding: 16px 14px 90px; animation: fadeUp 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── STATS ROW ─── */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-card {
    background: var(--surface); border-radius: 16px; padding: 14px 8px;
    text-align: center; border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .stat-icon { font-size: 22px; }
  .stat-val { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; color: var(--orange); line-height: 1.1; }
  .stat-lbl { font-size: 10px; color: var(--text3); font-weight: 500; margin-top: 1px; }

  /* ─── FILTER CHIPS ─── */
  .filter-scroll { overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .chips { display: flex; gap: 8px; width: max-content; }
  .chip {
    border: none; border-radius: 30px; padding: 7px 16px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    background: var(--surface); color: var(--text2);
    border: 1.5px solid var(--border);
    transition: all 0.2s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }
  .chip.active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* ─── MACHINE CARDS ─── */
  .machine-card {
    background: var(--surface); border-radius: 20px; margin-bottom: 14px;
    border: 1.5px solid var(--border); overflow: hidden;
    box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
  }
  .machine-card:active { transform: scale(0.985); box-shadow: none; }
  .machine-card.unavailable { opacity: 0.6; }
  .card-body { padding: 16px; }
  .card-top { display: flex; gap: 12px; align-items: flex-start; }
  .machine-icon-wrap {
    width: 54px; height: 54px; border-radius: 14px;
    background: var(--orange-light); display: flex; align-items: center;
    justify-content: center; font-size: 28px; flex-shrink: 0;
    border: 1.5px solid var(--orange-mid);
  }
  .machine-info { flex: 1; min-width: 0; }
  .machine-name {
    font-family: 'Baloo 2', cursive; font-size: 15px; font-weight: 700;
    color: var(--text1); line-height: 1.2;
  }
  .machine-owner { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .machine-dist { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .card-right { text-align: right; flex-shrink: 0; }
  .avail-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 3px 9px; border-radius: 8px; margin-bottom: 5px;
  }
  .avail-badge.yes { background: var(--green-light); color: var(--green); }
  .avail-badge.no { background: #F3F4F6; color: #6B7280; }
  .price-hr { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 800; color: var(--orange); }
  .price-day { font-size: 11px; color: var(--text3); }

  .card-divider { height: 1px; background: var(--border); margin: 12px 16px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
  .tag {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px;
    font-size: 11px; color: var(--text2); font-weight: 500;
  }
  .tag.condition-excellent { color: var(--green); font-weight: 700; }
  .tag.condition-good { color: var(--amber); font-weight: 700; }
  .tag.condition-fair { color: var(--red); font-weight: 700; }

  .btn-request {
    display: block; width: calc(100% - 32px); margin: 0 16px 16px;
    background: linear-gradient(135deg, #F97316, #EA580C);
    color: #fff; border: none; border-radius: 14px;
    padding: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Baloo 2', cursive; letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(249,115,22,0.35);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-request:active { transform: scale(0.97); box-shadow: none; }

  /* ─── BOOKING SCREEN ─── */
  #page-booking { display: none; }
  #page-booking.active { display: block; }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 8px 14px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text2);
    margin-bottom: 16px; width: fit-content;
    transition: all 0.15s;
  }
  .back-btn:active { background: var(--surface2); }

      </div>

}

// ═══════════════════════════════════════
//  BOOKING PAGE
// ═══════════════════════════════════════
function openBooking(id) {
  currentMachine = machines.find(m => m.id === id);
  rateType = 'hourly';
  duration = 4;

  document.getElementById('b-icon').textContent = currentMachine.icon;
  document.getElementById('b-name').textContent = currentMachine.name;
  document.getElementById('b-type').textContent = currentMachine.type;
  document.getElementById('b-owner').textContent = currentMachine.owner;
  document.getElementById('b-phone').textContent = currentMachine.phone;
  document.getElementById('b-hr').textContent = `₹${currentMachine.hr}/hr`;
  document.getElementById('b-dr').textContent = `₹${currentMachine.dr}/day`;
  document.getElementById('b-cond').textContent = currentMachine.condition;
  const condEl = document.getElementById('b-cond');
  condEl.style.color = currentMachine.condition === 'Excellent' ? 'var(--green)' : currentMachine.condition === 'Good' ? 'var(--amber)' : 'var(--red)';
  document.getElementById('b-svc').textContent = currentMachine.service;

  // Reset form
  document.getElementById('booking-date').value = '';
  document.getElementById('btn-hourly').classList.add('active');
  document.getElementById('btn-daily').classList.remove('active');
  document.getElementById('dur-num').textContent = 4;
  document.getElementById('dur-unit').textContent = 'Hours';
  document.getElementById('dur-unit-lbl').textContent = 'Hours';

  // Set today as min date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('booking-date').min = today;

  updatePrice();

  // Hide all pages, show booking
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-booking').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  window.scrollTo(0,0);
}

function closeBooking() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-browse').classList.add('active');
  document.getElementById('nav-browse').classList.add('active');
}

function setRateType(type) {
  rateType = type;
  duration = type === 'hourly' ? 4 : 1;
  document.getElementById('dur-num').textContent = duration;
  document.getElementById('btn-hourly').classList.toggle('active', type === 'hourly');
  document.getElementById('btn-daily').classList.toggle('active', type === 'daily');
  const unit = type === 'hourly' ? 'Hours' : 'Days';
  document.getElementById('dur-unit').textContent = unit;
  document.getElementById('dur-unit-lbl').textContent = unit;
  updatePrice();
}

function changeDur(delta) {
  duration = Math.max(1, duration + delta);
  document.getElementById('dur-num').textContent = duration;
  updatePrice();
}

function updatePrice() {
  if (!currentMachine) return;
  const rate = rateType === 'hourly' ? currentMachine.hr : currentMachine.dr;
  const total = duration * rate;
  const unitShort = rateType === 'hourly' ? 'hrs' : 'days';
  document.getElementById('price-formula').textContent = `${duration} ${unitShort} × ₹${rate.toLocaleString('en-IN')}`;
  document.getElementById('price-total').textContent = `= ₹${total.toLocaleString('en-IN')}`;
}

function submitRequest() {
  const date = document.getElementById('booking-date').value;
  if (!date) { showToast('Please select a date first!', true); return; }

  const rate = rateType === 'hourly' ? currentMachine.hr : currentMachine.dr;
  const total = duration * rate;

  requests.unshift({
    id: Date.now(),
    machine: currentMachine.name,
    type: currentMachine.type,
    owner: currentMachine.owner,
    farmer: 'My Farm',
    date, duration, rateType, total,
    status: 'pending'
  });

  showToast(`✅ Request sent to ${currentMachine.owner}!`);
  closeBooking();
}

// ═══════════════════════════════════════
//  REQUESTS PAGE
// ═══════════════════════════════════════
function renderRequests() {
  const container = document.getElementById('requests-list');
  if (requests.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No requests yet</div><div class="empty-sub">Browse machines and send a rental request!</div></div>`;
    return;
  }
  container.innerHTML = requests.map(r => `
    <div class="req-card">
      <div class="req-top">
        <div>
          <div class="req-machine">${r.machine}</div>
          <div class="req-owner">👤 Owner: ${r.owner}</div>
        </div>
        <span class="status-badge ${r.status}">${r.status.toUpperCase()}</span>
      </div>
      <div class="req-tags">
        <span class="req-tag">📅 ${r.date}</span>
        <span class="req-tag">⏱ ${r.duration} ${r.rateType === 'hourly' ? 'hrs' : 'days'}</span>
        <span class="req-tag">💰 ₹${r.total.toLocaleString('en-IN')}</span>
        <span class="req-tag">🔧 ${r.type}</span>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════
//  OWNER PAGE
// ═══════════════════════════════════════
function updateEarnings() {
  const accepted = requests.filter(r => r.status === 'accepted');
  const total = accepted.reduce((sum, r) => sum + r.total, 0);
  document.getElementById('e-month').textContent = `₹${total.toLocaleString('en-IN')}`;
  document.getElementById('e-rentals').textContent = accepted.length;
  document.getElementById('e-idle').textContent = `${accepted.length * 2} days`;
}

function renderOwnerRequests() {
  const container = document.getElementById('owner-requests-list');
  if (requests.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No incoming requests</div></div>`;
    return;
  }
  container.innerHTML = requests.map(r => `
    <div class="req-card" id="req-${r.id}">
      <div class="req-top">
        <div>
          <div class="req-machine">${r.machine}</div>
          <div class="req-owner">👨‍🌾 Farmer: ${r.farmer}</div>
        </div>
        <span class="status-badge ${r.status}">${r.status.toUpperCase()}</span>
      </div>
      <div class="req-tags">
        <span class="req-tag">📅 ${r.date}</span>
        <span class="req-tag">⏱ ${r.duration} ${r.rateType === 'hourly' ? 'hrs' : 'days'}</span>
        <span class="req-tag">💰 ₹${r.total.toLocaleString('en-IN')}</span>
      </div>
      ${r.status === 'pending' ? `
      <div class="req-actions">
        <button class="btn-accept" onclick="updateStatus(${r.id}, 'accepted')">✅ Accept</button>
        <button class="btn-decline" onclick="updateStatus(${r.id}, 'declined')">❌ Decline</button>
      </div>` : ''}
    </div>
  `).join('');
}

function updateStatus(id, status) {
  const req = requests.find(r => r.id === id);
  if (!req) return;
  req.status = status;
  renderOwnerRequests();
  updateEarnings();
  showToast(status === 'accepted' ? `✅ Request Accepted!` : `Request Declined`, status === 'declined');
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
renderMachines();
</script>
